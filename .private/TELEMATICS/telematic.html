<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert Lane | Telemetry Console</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="telemetry-console">
        <h2>Live System Telemetry</h2>
        <div id="data-readout">Initializing...</div>
    </div>

    <div class="scrollytelling-container">
        <div class="simulation-header">
            <h2>The Simulation</h2>
            <p>Scroll forward to manipulate the timeline. Monitor the stability meter.</p>
            <div id="collapse-meter">Stability: 100.00%</div>
        </div>
        
        <div class="depth-node" style="top: 50vh;">Temporal Shift: Level 1</div>
        <div class="depth-node" style="top: 150vh;">Temporal Shift: Level 2</div>
        <div class="depth-node" style="top: 250vh;">Critical Threshold Approaching</div>
        <div class="depth-node" style="top: 350vh;">Total System Inversion</div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
